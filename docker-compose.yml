  version: '3.8'

  services:
      telegram-bot:
        image: destinyxus/letter_future:2.0
        ports:
          - "8443:8443"
        depends_on:
          - db
        environment:
            - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
            - SENDGRID_API_KEY=${SENDGRID_API_KEY}
            - STORE_URL=${STORE_URL}
            - HASH_KEY=${HASH_KEY}
            - WEB_HOOK=${WEB_HOOK}
            - PEM=${PEM}
            - KEY=${KEY}
        env_file:
          - .env


      db:
        restart: always
        image: postgres:latest
        volumes:
          - ./.database/postgres/data:/var/lib/postgresql/data
        environment:
         - POSTGRES_USER=${POSTGRES_USER}
         - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
         - POSTGRES_DB=${POSTGRES_DB}
        ports:
          - "5432:5432"
        env_file:
          - .env
